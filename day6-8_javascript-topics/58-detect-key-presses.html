<!doctype html>
<!--
How it works:
1) Open this file in a browser.
2) Interact with the page elements.
3) Open DevTools Console to observe JavaScript behavior.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detect key presses</title>
</head>
<body>
  <h2>Press any key</h2>
<p id="key">Waiting...</p>
<script>
  const key = document.getElementById('key');
  window.addEventListener('keydown', (event) => {
    key.textContent = `Key: ${event.key}`;
  });
</script>
</body>
</html>
