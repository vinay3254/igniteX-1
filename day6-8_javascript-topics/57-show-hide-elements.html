<!doctype html>
<!--
How it works:
1) Open this file in a browser.
2) Interact with the page elements.
3) Open DevTools Console to observe JavaScript behavior.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Show/hide elements</title>
</head>
<body>
  <p id="box">Toggle me</p>
<button id="toggle">Show/Hide</button>
<script>
  const box = document.getElementById('box');
  document.getElementById('toggle').onclick = () => {
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  };
</script>
</body>
</html>
