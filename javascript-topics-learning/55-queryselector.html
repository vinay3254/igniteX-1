<!doctype html>
<!--
How it works:
1) Open this file in a browser.
2) Interact with the page elements.
3) Open DevTools Console to observe JavaScript behavior.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>querySelector()</title>
</head>
<body>
  <p class="item">First</p>
<p class="item">Second</p>
<script>
  const firstItem = document.querySelector('.item');
  firstItem.style.color = 'crimson';
</script>
</body>
</html>
